name: Secrets and Environments

on:
  push:
    branches:
      - main
      - develop

env:
  APP_NAME: af-pipelines-workshop
  NODE_ENV: production

jobs:
  basics:
    name: Run Basics Pipeline
    uses: ./.github/workflows/basics.yml
    permissions:
      contents: write

  log-global-secret:
    name: Log Global Secret
    runs-on: ubuntu-latest
    needs: basics

    steps:
      - name: Log workflow-level environment variables
        run: |
          echo "APP_NAME  : $APP_NAME"
          echo "NODE_ENV  : $NODE_ENV"

      - name: Use GLOBAL_SECRET
        env:
          GLOBAL_SECRET: ${{ secrets.GLOBAL_SECRET }}
        run: |
          if [ -z "$GLOBAL_SECRET" ]; then
            echo "GLOBAL_SECRET is not set."
          else
            echo "GLOBAL_SECRET is set (value masked by GitHub): ***"
          fi

  log-develop-secret:
    name: Log Develop Environment Secret
    runs-on: ubuntu-latest
    needs: basics
    if: github.ref == 'refs/heads/develop'
    environment: develop

    env:
      DEPLOY_URL: ${{ vars.DEPLOY_URL }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}

    steps:
      - name: Log develop environment variables
        run: |
          echo "DEPLOY_URL : $DEPLOY_URL"
          echo "LOG_LEVEL  : $LOG_LEVEL"

      - name: Use DEVELOP_SECRET
        env:
          DEVELOP_SECRET: ${{ secrets.DEVELOP_SECRET }}
        run: |
          if [ -z "$DEVELOP_SECRET" ]; then
            echo "DEVELOP_SECRET is not set."
          else
            echo "DEVELOP_SECRET is set (value masked by GitHub): ***"
          fi
