name: "Security Vulnerability Audit"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * 1" # Runs every Monday at 12:00 UTC

permissions:
  contents: read

jobs:
  # 1. SCA JOB: Checks third-party dependencies on Pull Requests
  dependency-review:
    name: Dependency Review (SCA)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # Only runs on PRs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Fail the build if critical or high vulnerabilities are found
          fail-on-severity: high # 'critical' | 'high' | 'moderate' | 'low'

  # 2. SAST JOB: Analyzes custom source code for security flaws
  codeql-analysis:
    name: CodeQL Static Analysis (SAST)
    runs-on: ubuntu-latest
    if: github.event.repository.private == false # Only runs on public repositories (CodeQL is free for public repos)
    permissions:
      actions: read
      contents: read
      security-events: write # Required to upload results to the Security tab

    strategy:
      fail-fast: false
      matrix:
        # Supported languages: 'javascript-typescript', 'python', 'go', 'java-kotlin', 'ruby', 'c-cpp', 'csharp'
        # Adapt this list to match your workshop's language
        language: ["javascript-typescript"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # 'security-extended' adds extra security queries beyond the default suite
          queries: security-extended

      # Note: For compiled languages (Java, C#, C++), you would need an autobuild/build step here.
      - name: Autobuild (If needed)
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  trivy-audit:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Required to upload results to the Security tab

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Trivy vulnerability scanner (Repo OSS)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs" # 'fs' stands for filesystem (scans code & dependencies)
          scan-ref: "."
          format: "sarif" # Exporting to SARIF allows GitHub to display it natively
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH" # Focus on high-impact flaws to prevent alert fatigue

      # Upload findings to the GitHub Security Tab
      # This integrates the open-source results directly into the GitHub UI
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() # Ensure results are uploaded even if vulnerabilities are found
        with:
          sarif_file: "trivy-results.sarif"

      # This step explicitly breaks the build on PRs if Critical flaws exist
      - name: Enforce Security Gate
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table" # Output a clean table directly into the GitHub Actions log
          exit-code: "1" # A non-zero exit code will intentionally fail the workflow
          severity: "CRITICAL,HIGH"
