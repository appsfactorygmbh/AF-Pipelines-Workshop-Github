name: Deploy Basics

on:
  push:
    branches: 
      - main
      - develop
  workflow_call:

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run npm audit
        run: |
          AUDIT=$(npm audit --json || true)
          if [ -z "$AUDIT" ] || [ "$AUDIT" = "{}" ]; then
            echo "No vulnerabilities found."
          else
            echo "Vulnerabilities found. Please address them."
            npm audit
            # exit 1
          fi

      - name: Run npm outdated check
        run: |
          OUTDATED=$(npm outdated --json || true)
          if [ -z "$OUTDATED" ] || [ "$OUTDATED" = "{}" ]; then
            echo "Dependencies are up to date."
          else
            echo "Some dependencies are outdated. Please update them."
            npm outdated
            # exit 1
          fi

      - name: Run unit tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.get_version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

        

      