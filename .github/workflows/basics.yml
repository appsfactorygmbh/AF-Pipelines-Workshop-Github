name: Deploy Basics

on:
  push:
    branches: 
      - main
      - develop
  workflow_call:

jobs:
  preparation:
    name: Lint, Type Check, Audit and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run npm audit
        run: |
          if npm audit --audit-level=moderate; then
            echo "No vulnerabilities found."
          else
            echo "Vulnerabilities found. Please address them."
            # exit 1
          fi

      - name: Run npm outdated check
        run: |
          OUTDATED=$(npm outdated --json || true)
          if [ -z "$OUTDATED" ] || [ "$OUTDATED" = "{}" ]; then
            echo "Dependencies are up to date."
          else
            echo "Some dependencies are outdated. Please update them."
            npm outdated
            # exit 1
          fi

      - name: Run unit tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: preparation

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version (main only)
        if: github.ref == 'refs/heads/main' 
        id: bump_version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(node -p "
            const [major, minor, patch] = '$CURRENT'.split('.').map(Number);
            \`\${major}.\${minor}.\${patch + 1}\`
          ")
          npm version "$NEW" --no-git-tag-version
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped version from $CURRENT to $NEW"

      - name: Commit version bump (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to v${{ steps.bump_version.outputs.version }} [skip ci]"
          git push origin HEAD

      - name: Get app version
        id: app_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.app_version.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: Deploy to Azure Static Website
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload to Azure Blob Storage ($web)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --destination '$web' \
              --source dist/ \
              --overwrite

  tag:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.get_version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

        

      