name: Rollback Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to roll back to (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.parse.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag exists
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: tag '$TAG' does not exist in this repository."
            exit 1
          fi
          echo "Tag '$TAG' found at $(git rev-parse "$TAG")"

      - name: Parse version from tag
        id: parse
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="$TAG"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Rolling back to version $VERSION"

  build:
    name: Build Tag ${{ inputs.tag }}
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ needs.validate.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rollback-dist
          path: dist/

  deploy:
    name: Deploy ${{ inputs.tag }} to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rollback-dist
          path: dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
